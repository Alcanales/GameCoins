<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel Administrativo - GameQuest</title>
    <style>
        :root { --bg-page: #f2f2f2; --panel-header: #f8dbdb; --table-header: #e9f0eb; --text-dark: #3e5048; }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-page); margin: 0; padding: 20px; padding-bottom: 100px; color: var(--text-dark); }
        .admin-header { background-color: var(--panel-header); border-radius: 15px; padding: 30px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #e5c5c5; margin-bottom: 20px; }
        .btn-admin-file { background: white; border: 1px solid #ccc; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #4a665a; }
        .main-table { width: 100%; background: white; border-radius: 12px; border-collapse: collapse; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        th { background-color: var(--table-header); padding: 15px; text-align: left; font-size: 11px; color: #6a8377; border-bottom: 2px solid #dae5de; }
        td { padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .qty-scroll { max-height: 60px; overflow-y: auto; border: 1px solid #dae5de; border-radius: 4px; width: 60px; }
        .qty-select { width: 100%; border: none; background: #e9f0eb; padding: 5px; font-weight: bold; }
        .footer-summary { position: fixed; bottom: 0; left: 0; width: 100%; background: white; padding: 20px 60px; display: flex; gap: 60px; border-top: 1px solid #eee; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="admin-header">
        <h2 style="margin:0; color:#4a665a;">Panel de Análisis Interno</h2>
        <button class="btn-admin-file" onclick="document.getElementById('fileIn').click()">📂 Cargar CSV Interno</button>
        <input type="file" id="fileIn" style="display:none" accept=".csv" onchange="handleAdminFile(this)">
    </div>
    <table class="main-table" id="resultsTable" style="display:none">
        <thead>
            <tr>
                <th width="40"><input type="checkbox" id="checkAll" checked onclick="toggleAll(this)"></th>
                <th>CARTA</th><th>STOCK / LÍMITE</th><th width="80">CANTIDAD</th><th>ESTADO</th><th>OFERTA CASH</th>
            </tr>
        </thead>
        <tbody id="adminBody"></tbody>
    </table>
    <div class="footer-summary" id="footerBar" style="display:none">
        <div><small>TOTAL COMPRA</small><div id="totalAdmin" style="font-size:24px; font-weight:800; color:#4a665a;">$0</div></div>
    </div>
    <script>
        const API = "https://gamecoins.onrender.com";
        let rawData = [];
        async function handleAdminFile(input) {
            const file = input.files[0]; if (!file) return;
            const fd = new FormData(); fd.append('file', file);
            try {
                const res = await fetch(`${API}/admin/analyze_csv`, {
                    method: 'POST', headers: { 'x-admin-user': 'Tomas_1_2_3', 'x-admin-pass': 'GameQuest2025_1' }, body: fd
                });
                rawData = await res.json(); renderAdmin();
            } catch (e) { alert("Error en el servidor"); }
        }
        function renderAdmin() {
            const t = document.getElementById('adminBody');
            t.innerHTML = rawData.map((c, i) => `
                <tr>
                    <td><input type="checkbox" class="sel" data-idx="${i}" checked onchange="calc()"></td>
                    <td><b>${c.name}</b></td><td>${c.current_stock} / ${c.stock_limit}</td>
                    <td><div class="qty-scroll"><select class="qty-select" data-idx="${i}" onchange="calc()">
                        ${Array.from({length: 10}, (_, k) => `<option value="${k+1}">${k+1}</option>`).join('')}
                    </select></div></td>
                    <td><span style="background:#b7ceb9; padding:4px 12px; border-radius:15px; font-size:11px;">${c.status}</span></td>
                    <td style="font-weight:800;">$${(c.valor_compra_efectivo || 0).toLocaleString()}</td>
                </tr>`).join('');
            document.getElementById('resultsTable').style.display = 'table';
            document.getElementById('footerBar').style.display = 'flex';
            calc();
        }
        function calc() {
            let cash = 0;
            document.querySelectorAll('.sel:checked').forEach(el => {
                const idx = el.dataset.idx;
                const qty = parseInt(document.querySelector(`.qty-select[data-idx="${idx}"]`).value);
                cash += (rawData[idx].valor_compra_efectivo || 0) * qty;
            });
            document.getElementById('totalAdmin').innerText = "$" + cash.toLocaleString();
        }
        function toggleAll(src) { document.querySelectorAll('.sel').forEach(x => x.checked = src.checked); calc(); }
    </script>
</body>
</html>
