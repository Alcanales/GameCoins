<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Interna - GameQuest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0f172a; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-8 text-slate-200">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-black text-yellow-500 italic">INTERNAL VAULT <span class="text-white">.</span></h1>
            <button onclick="location.reload()" class="text-slate-500 text-xs font-bold hover:text-white">SALIR</button>
        </div>

        <div class="glass p-8 rounded-3xl mb-8">
            <div class="flex items-center gap-6">
                <input type="file" id="fileIn" class="hidden" accept=".csv" onchange="updateFileName()">
                <button onclick="document.getElementById('fileIn').click()" class="bg-white/10 hover:bg-white/20 px-6 py-3 rounded-xl font-bold transition text-sm">
                    <i class="fas fa-file-csv mr-2"></i> Seleccionar CSV de Stock
                </button>
                <span id="file-name" class="text-slate-500 italic text-sm">No se ha seleccionado archivo</span>
                <button id="btn-process" onclick="processStock()" class="ml-auto bg-yellow-500 hover:bg-yellow-400 text-slate-900 px-8 py-3 rounded-xl font-black uppercase text-xs tracking-widest transition-all">
                    Procesar Análisis
                </button>
            </div>
        </div>

        <div id="admin-results" class="hidden space-y-6">
            <div class="glass rounded-3xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                        <tr>
                            <th class="px-8 py-5">Carta</th>
                            <th class="px-8 py-5 text-center">Stock Actual</th>
                            <th class="px-8 py-5 text-center">Nueva Oferta</th>
                            <th class="px-8 py-5 text-center">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="admin-tbody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>

            <div class="flex justify-end">
                <button onclick="commitToDB()" class="bg-green-600 hover:bg-green-500 text-white px-12 py-5 rounded-2xl font-black uppercase text-sm tracking-widest shadow-xl shadow-green-900/20">
                    <i class="fas fa-database mr-2"></i> Ejecutar Cambios (Commit)
                </button>
            </div>
        </div>
    </div>

    <script>
        const API = "https://gamecoins.onrender.com";

        function updateFileName() {
            const file = document.getElementById('fileIn').files[0];
            document.getElementById('file-name').innerText = file ? file.name : "No se ha seleccionado archivo";
        }

        async function processStock() {
            const file = document.getElementById('fileIn').files[0];
            if(!file) return Swal.fire('Aviso', 'Selecciona un archivo primero', 'warning');

            const fd = new FormData(); fd.append('file', file);
            Swal.fire({ title: 'Analizando base de datos...', didOpen: () => Swal.showLoading() });

            try {
                const res = await fetch(`${API}/api/public/analyze_buylist`, { method: 'POST', body: fd });
                const data = await res.json();
                
                const body = document.getElementById('admin-tbody');
                body.innerHTML = '';
                data.forEach(c => {
                    body.innerHTML += `<tr>
                        <td class="px-8 py-5 font-bold">${c.name}</td>
                        <td class="px-8 py-5 text-center text-slate-400">${c.qty}</td>
                        <td class="px-8 py-5 text-center text-yellow-500 font-black">$${c.price_normal.toLocaleString()}</td>
                        <td class="px-8 py-5 text-center"><span class="text-[10px] font-bold bg-white/10 px-3 py-1 rounded-full uppercase">PROCESADO</span></td>
                    </tr>`;
                });

                document.getElementById('admin-results').classList.remove('hidden');
                Swal.close();
            } catch(e) { Swal.fire('Error', 'Fallo en la comunicación con la Bóveda', 'error'); }
        }

        function commitToDB() {
            Swal.fire({
                title: '¿Confirmar Commit?',
                text: "Se actualizarán los precios y stocks en el servidor de GameQuest.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#16a34a',
                confirmButtonText: 'Sí, ejecutar cambios'
            }).then((result) => {
                if (result.isConfirmed) {
                    Swal.fire('¡Éxito!', 'La base de datos ha sido actualizada.', 'success');
                }
            });
        }
    </script>
</body>
</html>
