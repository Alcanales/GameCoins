<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Bóveda GameQuest - Control Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; }
        .vault-bg {
            background-color: #0f172a;
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-size: 150% 150%;
            animation: gradient-move 15s ease infinite;
        }
        @keyframes gradient-move {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .input-aesthetic { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; transition: all 0.3s; }
        .input-aesthetic:focus { background: rgba(255, 255, 255, 0.15); border-color: #fbbf24; outline: none; }
    </style>
</head>
<body class="vault-bg min-h-screen text-slate-200">

    <div id="login-view" class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-sm glass p-8 rounded-3xl shadow-2xl">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-gradient-to-br from-yellow-500 to-yellow-700 shadow-lg mb-4 text-white text-2xl">
                    <i class="fas fa-user-shield"></i>
                </div>
                <h2 class="text-2xl font-bold text-white tracking-tight">Acceso Bóveda</h2>
                <p class="text-sm text-gray-400 mt-2">Identifícate para gestionar puntos</p>
            </div>
            <form onsubmit="event.preventDefault(); login();" class="space-y-6">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Usuario Admin</label>
                    <input type="text" id="user" class="input-aesthetic w-full rounded-xl py-3 px-4 mt-1 text-sm" placeholder="Usuario">
                </div>
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-widest ml-1">Contraseña</label>
                    <input type="password" id="pass" class="input-aesthetic w-full rounded-xl py-3 px-4 mt-1 text-sm" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-white hover:bg-yellow-500 hover:text-white text-slate-900 font-bold py-3.5 rounded-xl transition-all shadow-lg transform active:scale-95 text-sm uppercase">Ingresar</button>
            </form>
        </div>
    </div>

    <div id="dashboard-view" class="hidden min-h-screen p-6 md:p-12 opacity-0 transition-opacity duration-700">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-slate-900 flex items-center justify-center text-yellow-400 border border-white/10"><i class="fas fa-coins"></i></div>
                    <h1 class="font-bold text-white text-xl">Panel Bóveda</h1>
                </div>
                <button onclick="location.reload()" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-xl text-xs font-bold transition">SALIR</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="glass p-8 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Clientes</p>
                    <p id="stat-count" class="text-4xl font-black text-white">--</p>
                </div>
                <div class="glass p-8 rounded-3xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Puntos Totales</p>
                    <p id="stat-pts" class="text-4xl font-black text-yellow-500">--</p>
                </div>
            </div>

            <div class="glass rounded-3xl overflow-hidden shadow-2xl">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-[10px] font-bold text-slate-500 uppercase tracking-widest">
                        <tr><th class="px-8 py-5">Cliente</th><th class="px-8 py-5 text-center">Saldo</th><th class="px-8 py-5 text-center">Acciones</th></tr>
                    </thead>
                    <tbody id="user-table" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API = "https://gamecoins.onrender.com";
        let u_auth, p_auth;

        async function login() {
            u_auth = document.getElementById('user').value;
            p_auth = document.getElementById('pass').value;
            try {
                const res = await fetch(`${API}/admin/users`, { headers: { "x-admin-user": u_auth, "x-admin-pass": p_auth } });
                if(res.ok) {
                    document.getElementById('login-view').classList.add('hidden');
                    const dash = document.getElementById('dashboard-view');
                    dash.classList.remove('hidden');
                    setTimeout(() => dash.classList.add('opacity-100'), 50);
                    load();
                } else { Swal.fire('Error', 'Credenciales inválidas', 'error'); }
            } catch(e) { Swal.fire('Error', 'Conectando con Render...', 'warning'); }
        }

        async function load() {
            const res = await fetch(`${API}/admin/users`, { headers: { "x-admin-user": u_auth, "x-admin-pass": p_auth } });
            const data = await res.json();
            const body = document.getElementById('user-table');
            body.innerHTML = '';
            let total = 0;
            data.forEach(u => {
                total += u.saldo;
                body.innerHTML += `
                <tr>
                    <td class="px-8 py-5 font-bold text-white">${u.email}</td>
                    <td class="px-8 py-5 text-center"><span class="bg-yellow-500/10 text-yellow-500 px-4 py-1 rounded-full font-black text-xs">${u.saldo} QP</span></td>
                    <td class="px-8 py-5 text-center">
                        <button onclick="adjust('${u.email}', 'add')" class="text-green-500 mx-2 hover:scale-110 transition"><i class="fas fa-plus-circle fa-lg"></i></button>
                        <button onclick="adjust('${u.email}', 'subtract')" class="text-red-500 mx-2 hover:scale-110 transition"><i class="fas fa-minus-circle fa-lg"></i></button>
                    </td>
                </tr>`;
            });
            document.getElementById('stat-count').innerText = data.length;
            document.getElementById('stat-pts').innerText = total.toLocaleString();
        }

        async function adjust(email, op) {
            const { value: amt } = await Swal.fire({ title: op==='add'?'Abonar':'Descontar', input: 'number', background: '#0f172a', color: '#fff' });
            if(amt) {
                await fetch(`${API}/admin/adjust_balance`, {
                    method: 'POST',
                    headers: { "Content-Type": "application/json", "x-admin-user": u_auth, "x-admin-pass": p_auth },
                    body: JSON.stringify({ email, amount: parseInt(amt), operation: op })
                });
                load();
            }
        }
    </script>
</body>
</html>
