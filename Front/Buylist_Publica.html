<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vende tus Cartas - GameQuest</title>
    <style>
        :root {
            --bg-pastel: #f0f4f2; --header-pastel: #e2ede7; --accent-soft: #f8d7da;
            --text-main: #2c3e50; --success-text: #155724; --border-soft: #d1d9d4;
        }
        body { font-family: system-ui, sans-serif; background-color: var(--bg-pastel); color: var(--text-main); margin: 0; padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: #fff; border-radius: 20px; padding: 40px; border: 1px solid var(--border-soft); box-shadow: 0 8px 30px rgba(0,0,0,0.05); }
        .upload-header { background-color: var(--accent-soft); border-radius: 12px; padding: 25px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border: 1px solid #f5c6cb; }
        .btn-upload { background: white; padding: 12px 24px; border-radius: 8px; cursor: pointer; border: 1px solid #ddd; font-weight: 700; color: #843534; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; background: var(--header-pastel); color: #5a7a6d; font-size: 12px; }
        td { padding: 15px; border-bottom: 1px solid #eee; }
        .qty-scroll { max-height: 60px; overflow-y: auto; border: 1px solid #ced4da; border-radius: 4px; width: 65px; }
        .qty-select { width: 100%; border: none; background: #f9fbf9; padding: 5px; cursor: pointer; }
        .summary-bar { position: sticky; bottom: 20px; background: #4a665a; color: white; padding: 20px 40px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-submit { background: white; color: #4a665a; border: none; padding: 12px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="text-align:center; color:#4a665a;">Cotizador GameQuest</h1>
        <div class="upload-header">
            <div style="font-size: 20px; font-weight: bold; color: #843534;">Análisis de Lista</div>
            <button class="btn-upload" onclick="document.getElementById('csv').click()">📂 Seleccionar CSV</button>
            <input type="file" id="csv" style="display:none" accept=".csv" onchange="processFile()">
        </div>
        <div id="resultsArea" style="display:none">
            <table>
                <thead>
                    <tr>
                        <th width="40"><input type="checkbox" id="checkAll" checked onclick="toggleAll(this)"></th>
                        <th>CARTA</th><th width="80">CANTIDAD</th><th>ESTADO</th><th>OFERTA</th>
                    </tr>
                </thead>
                <tbody id="tbody"></tbody>
            </table>
        </div>
        <div class="summary-bar" id="footerBar" style="display:none">
            <div><small>TOTAL ESTIMADO</small><div id="tCash" style="font-size: 24px; font-weight: 800;">$0</div></div>
            <button class="btn-submit" onclick="submitBuylist()">ENVIAR SOLICITUD</button>
        </div>
    </div>
    <script>
        const API = "https://gamecoins.onrender.com";
        let rawData = [];
        async function processFile() {
            const file = document.getElementById('csv').files[0];
            if (!file) return;
            const fd = new FormData(); fd.append('file', file);
            try {
                const res = await fetch(`${API}/api/public/analyze_buylist`, { method: 'POST', body: fd });
                rawData = await res.json();
                render();
            } catch (e) { alert("Error de conexión"); }
        }
        function render() {
            const t = document.getElementById('tbody');
            t.innerHTML = rawData.map((c, i) => `
                <tr>
                    <td><input type="checkbox" class="sel" data-idx="${i}" checked onchange="calc()"></td>
                    <td><b>${c.name}</b></td>
                    <td><div class="qty-scroll"><select class="qty-select" data-idx="${i}" onchange="calc()">
                        ${Array.from({length: 10}, (_, k) => `<option value="${k+1}">${k+1}</option>`).join('')}
                    </select></div></td>
                    <td><span style="background:#d4edda; padding:4px 10px; border-radius:15px; font-size:11px;">${c.status}</span></td>
                    <td style="font-weight:bold">$${(c.cash_normal || 0).toLocaleString()}</td>
                </tr>`).join('');
            document.getElementById('resultsArea').style.display = 'block';
            document.getElementById('footerBar').style.display = 'flex';
            calc();
        }
        function calc() {
            let total = 0;
            document.querySelectorAll('.sel:checked').forEach(el => {
                const idx = el.dataset.idx;
                const qty = parseInt(document.querySelector(`.qty-select[data-idx="${idx}"]`).value);
                total += (rawData[idx].cash_normal || 0) * qty;
            });
            document.getElementById('tCash').innerText = "$" + total.toLocaleString();
        }
        function toggleAll(src) { document.querySelectorAll('.sel').forEach(x => x.checked = src.checked); calc(); }
    </script>
</body>
</html>
