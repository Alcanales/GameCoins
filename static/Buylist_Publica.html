<script>
const GAMECOINS_API_URL = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:8000' : 'https://gamecoins.onrender.com';

let csvFile=null, allCards=[], payMode=null, cashEnabled=true;

(async()=>{
  try{
    const r=await fetch(`${GAMECOINS_API_URL}/api/public/buylist_status`);
    const s=await r.json();
    cashEnabled=s.cash_enabled;
    if(!s.open){
      document.getElementById('closed-banner').style.display='';
    } else {
      document.getElementById('app-section').style.display='';
    }
    if(!cashEnabled){
      ['sum-cash-col','pay-cash-col','bar-cash-wrap','cash-col-hd'].forEach(id=>{
        const el=document.getElementById(id);
        if(el) el.style.display='none';
      });
      const pc=document.getElementById('pay-cash');
      if(pc) pc.style.display='none';
      document.querySelectorAll('.tbl-head,.tbl-row').forEach(el=>{
        el.style.gridTemplateColumns='28px 1fr 96px 106px';
      });
    }
  }catch(e){ document.getElementById('app-section').style.display=''; }
})();

const dz=document.getElementById('drop-zone');
dz.addEventListener('dragover',e=>{e.preventDefault();dz.classList.add('drag-over')});
dz.addEventListener('dragleave',()=>dz.classList.remove('drag-over'));
dz.addEventListener('drop',e=>{e.preventDefault();dz.classList.remove('drag-over');if(e.dataTransfer.files[0])setFile(e.dataTransfer.files[0])});

function setFile(f){
  csvFile=f; dz.classList.add('has-file');
  document.getElementById('drop-text').textContent=f.name;
  document.getElementById('upload-actions').style.display='flex';
}
function resetFile(){
  csvFile=null; dz.classList.remove('has-file');
  document.getElementById('drop-text').textContent='Arrastra tu CSV o haz clic para seleccionar';
  document.getElementById('upload-actions').style.display='none';
  document.getElementById('csv-inp').value='';
}

async function analyze(){
  if(!csvFile) return;
  show('upload-card',false); show('loading-state',true); show('results-section',false);
  try{
    const fd=new FormData(); fd.append('file',csvFile);
    const r=await fetch(`${GAMECOINS_API_URL}/api/public/analyze_buylist`,{method:'POST',body:fd});
    if(!r.ok){const e=await r.json();throw new Error(e.detail||`Error ${r.status}`)}
    allCards=await r.json();
    renderResults();
  }catch(e){
    show('loading-state',false); show('upload-card',true);
    swal('Error',e.message,'error');
  }
}

function statusOf(c){
  const s=c.buying_status;
  if(s==='muy_alta'||s==='compramos') return 'buying';
  if(s==='compra_parcial') return 'partial';
  if(s==='stock_completo') return 'full';
  return 'unlisted';
}

function renderResults(){
  show('loading-state',false); show('results-section',true); show('totals-bar',true);
  const list=document.getElementById('cards-list');
  list.innerHTML='';
  let nBuying=0, nFull=0, nRendered=0;

  allCards.forEach((c,idx)=>{
    const st=statusOf(c);
    
    if (st === 'unlisted') return;

    nRendered++;
    const canBuy=st==='buying'||st==='partial';
    if(canBuy) nBuying++;
    if(st==='full') nFull++;
    const maxQty=c.qty_comprar??(canBuy?c.qty:0);

    const cond={near_mint:'NM',light_played:'LP',moderately_played:'MP',heavily_played:'HP',damaged:'DMG'}[c.condition]||'';
    const condColor={near_mint:'#16a34a',light_played:'#65a30d',moderately_played:'#d97706',heavily_played:'#dc2626',damaged:'#9f1239'}[c.condition]||'#94a3b8';
    const isFoil=c.foil&&c.foil!=='normal';

    const badgeMap={
      buying:`<span class="gq-badge gb-buying"><i class="fas fa-circle-check" style="font-size:9px"></i> Compramos</span>`,
      partial:`<span class="gq-badge gb-partial"><i class="fas fa-bolt" style="font-size:9px"></i> Parcial: ${maxQty} de ${c.qty}</span>`,
      full:`<span class="gq-badge gb-full"><i class="fas fa-ban" style="font-size:9px"></i> Stock completo</span>`
    };
    const maBadge=c.buying_status==='muy_alta'?`<span class="gq-badge gb-muyalta" style="margin-left:4px"><i class="fas fa-fire" style="font-size:9px"></i> Alta demanda</span>`:'';
    const cupoFill=c.max_stock?Math.min(100,Math.round(((c.stock_actual||0)/c.max_stock)*100)):0;

    const div=document.createElement('div');
    div.className=`tbl-row card-row ${st==='full'?'row-full':''}`;
    div.dataset.status=st; div.id=`row-${idx}`;

    const col1=`<div style="display:flex;align-items:flex-start;padding-top:2px">
      <input type="checkbox" class="gq-check cc" data-idx="${idx}"
        ${canBuy?'checked':''} ${canBuy?'':'disabled'} onchange="onChk(${idx})">
    </div>`;

    const col2=`<div style="min-width:0">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:4px">
        <span style="font-weight:700;font-size:13.5px;color:#0f172a">${esc(c.name)}</span>
        ${isFoil?`<span class="gq-badge gb-foil">✨ ${c.foil}</span>`:''}
        ${c.is_estaca?`<span class="gq-badge gb-estaca">★ De Nicho</span>`:''}
        ${cond?`<span style="font-size:10px;font-weight:700;color:${condColor}">${cond}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">${badgeMap[st]||''}${maBadge}</div>
      ${canBuy&&c.max_stock?`<div style="max-width:140px;margin-top:5px">
        <div style="display:flex;justify-content:space-between;font-size:9px;color:#94a3b8">
          <span>${c.stock_actual??'?'} / ${c.max_stock}</span><span>cupo: ${maxQty}</span>
        </div>
        <div class="cupo-bar"><div class="cupo-fill" style="width:${cupoFill}%"></div></div>
      </div>`:''}
    </div>`;

    const col3=`<div style="text-align:right">
      <div style="font-weight:900;font-size:.95rem;color:#7c3aed;line-height:1" id="pqp-${idx}">
        ${canBuy?fmtCLP(c.price_credito*maxQty):'—'}
      </div>
      ${canBuy?`<div style="font-size:9px;color:#94a3b8;margin-top:2px">/ u: ${fmtCLP(c.price_credito)}</div>`:''}
    </div>`;

    const col4=cashEnabled?`<div style="text-align:right">
      <div style="font-weight:700;font-size:.9rem;color:#16a34a;line-height:1" id="pcs-${idx}">
        ${canBuy?fmtCLP(c.price_cash*maxQty):''}
      </div>
      ${canBuy?`<div style="font-size:9px;color:#94a3b8;margin-top:2px">/ u: ${fmtCLP(c.price_cash)}</div>`:''}
    </div>`:`<div></div>`;

    const col5=canBuy?`<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
        <input type="number" class="qty-inp" id="qty-${idx}" value="${maxQty}" min="1" max="${maxQty}"
          oninput="onQtyChange(${idx})">
        <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
      </div>
      <div style="font-size:9px;color:#94a3b8">máx ${maxQty}</div>
    </div>`:`<div></div>`;

    div.innerHTML=col1+col2+col3+col4+col5;
    list.appendChild(div);
  });

  const t=recalcTotals();
  setText('sum-total',nRendered);
  setText('sum-buying',nBuying);
  setText('sum-qp',fmtCLP(t.qp));
  setText('sum-cash',fmtCLP(t.cash));
  setText('pay-qp-tot',fmtCLP(t.qp));
  setText('pay-cash-tot',fmtCLP(t.cash));
  if(nFull>0){
    show('full-alert',true);
    setText('full-alert-txt',`${nFull} carta${nFull>1?'s':''} en gris — ya tenemos stock completo para esas. Solo se cotizarán las seleccionadas.`);
  }
  updateBar();
}

function onChk(idx){updateBar()}
function changeQty(idx,d){
  const inp=document.getElementById(`qty-${idx}`);
  if(!inp) return;
  const mx=parseInt(inp.max)||1;
  inp.value=Math.max(1,Math.min(mx,parseInt(inp.value||1)+d));
  onQtyChange(idx);
}
function onQtyChange(idx){
  const c=allCards[idx];
  const inp=document.getElementById(`qty-${idx}`);
  if(!inp) return;
  const mx=parseInt(inp.max)||1;
  let v=parseInt(inp.value)||1;
  if(v<1)v=1; if(v>mx)v=mx; inp.value=v;
  const el=document.getElementById(`pqp-${idx}`);
  const ec=document.getElementById(`pcs-${idx}`);
  if(el) el.textContent=fmtCLP(c.price_credito*v);
  if(ec) ec.textContent=fmtCLP(c.price_cash*v);
  updateBar();
}
function recalcTotals(){
  let qp=0,cash=0,count=0;
  document.querySelectorAll('.cc:checked:not(:disabled)').forEach(cb=>{
    const idx=parseInt(cb.dataset.idx);
    const c=allCards[idx];
    const qty=parseInt(document.getElementById(`qty-${idx}`)?.value||1);
    qp+=c.price_credito*qty; cash+=c.price_cash*qty; count++;
  });
  return {qp,cash,count};
}
function updateBar(){
  const t=recalcTotals();
  setText('bar-count',`${t.count} carta${t.count!==1?'s':''}`);
  setText('bar-qp',fmtCLP(t.qp));
  setText('bar-cash',fmtCLP(t.cash));
  setText('pay-qp-tot',fmtCLP(t.qp));
  setText('pay-cash-tot',fmtCLP(t.cash));
  document.getElementById('btn-submit').disabled=(!t.count||!payMode);
}
function setFilter(f,btn){
  document.querySelectorAll('.gq-fb').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.querySelectorAll('.card-row').forEach(row=>{
    row.classList.toggle('row-hidden',f!=='all'&&row.dataset.status!==f);
  });
}
function selectAll(v){
  document.querySelectorAll('.cc:not(:disabled)').forEach(cb=>cb.checked=v);
  document.getElementById('chk-all').checked=v;
  updateBar();
}
function toggleAll(v){selectAll(v)}
function selectPay(m){
  payMode=m;
  document.getElementById('pay-qp').className='pay-opt'+(m==='credito'?' sel-qp':'');
  document.getElementById('pay-cash').className='pay-opt'+(m==='cash'?' sel-cash':'');
  updateBar();
}
async function submitOrder(){
  const email=document.getElementById('inp-email').value.trim();
  const rut=document.getElementById('inp-rut').value.trim();
  if(!email||!email.includes('@')) return swal('Email requerido','Ingresa un email válido','warning');
  if(!rut) return swal('RUT requerido','Ingresa tu RUT','warning');
  if(!payMode) return swal('Selecciona forma de pago','','warning');
  const items=[];
  document.querySelectorAll('.cc:checked:not(:disabled)').forEach(cb=>{
    const idx=parseInt(cb.dataset.idx);
    const qty=parseInt(document.getElementById(`qty-${idx}`)?.value||1);
    items.push({...allCards[idx],qty,qty_selected:qty});
  });
  if(!items.length) return swal('Sin cartas seleccionadas','','warning');
  const totalQP=items.reduce((s,i)=>s+i.price_credito*i.qty,0);
  const totalCash=items.reduce((s,i)=>s+i.price_cash*i.qty,0);
  const {isConfirmed}=await Swal.fire({
    title:'¿Confirmar cotización?',
    html:`<div style="font-size:13px;color:#475569;line-height:1.9">
      <strong style="color:#0f172a">${items.length} cartas</strong> · 
      <strong style="color:#0f172a">${payMode==='credito'?'💎 QP':'💵 Cash'}</strong><br>
      Total: <strong style="color:${payMode==='credito'?'#7c3aed':'#16a34a'};font-size:1.1rem">
        ${fmtCLP(payMode==='credito'?totalQP:totalCash)}</strong><br>
      <span style="color:#94a3b8;font-size:11px">Copia → ${email}</span>
    </div>`,
    confirmButtonText:'Confirmar',showCancelButton:true,cancelButtonText:'Revisar',
    confirmButtonColor:'#0f172a',
  });
  if(!isConfirmed) return;
  const btn=document.getElementById('btn-submit');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-circle-notch spin" style="margin-right:8px"></i>Enviando…';
  try{
    const r=await fetch(`${GAMECOINS_API_URL}/api/public/commit_buylist`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,rut,nombre:document.getElementById('inp-nombre').value.trim(),
        payment_preference:payMode,items,total_credito:totalQP,total_cash:totalCash}),
    });
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Error');
    Swal.fire({icon:'success',title:'¡Cotización enviada! 🎉',
      html:`<div style="font-size:13px;color:#475569">Orden <strong>#${d.order_id}</strong> — copia enviada a <strong>${email}</strong></div>`,
      confirmButtonText:'Entendido',confirmButtonColor:'#0f172a',
    }).then(()=>location.reload());
  }catch(e){
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-paper-plane" style="margin-right:8px"></i>Confirmar Cotización';
    swal('Error',e.message,'error');
  }
}
function fmtCLP(n){return '$'+Math.round(n||0).toLocaleString('es-CL')}
function fmtUSD(n){return '$'+(n||0).toFixed(2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function show(id,v){const el=document.getElementById(id);if(el)el.style.display=v?'':'none'}
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v}
function swal(t,txt,icon){Swal.fire({title:t,text:txt,icon,confirmButtonColor:'#0f172a'})}
</script>
