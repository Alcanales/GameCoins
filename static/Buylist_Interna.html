<script>
const GAMECOINS_API_URL = (location.hostname==='localhost'||location.hostname==='127.0.0.1')
  ? 'http://localhost:8000' : 'https://gamecoins.onrender.com';
let token='', csvFile=null, allCards=[], payMode=null, cashEnabled=true;
let statusFilter='all', tierFilter='all', searchQ='';

const ah     = () => ({'Authorization':`Bearer ${token}`,'Content-Type':'application/json'});
const ahForm = () => ({'Authorization':`Bearer ${token}`});

function canonical(s){
  if(!s) return '';
  s = s.split('|')[0];
  ['—','–'].forEach(d=>{ s=s.split(d)[0]; });
  s = s.replace(/\(.*?\)/g,'').replace(/\[.*?\]/g,'');
  const apos=['\u2018','\u2019','\u201A','\u201B','\u02BC','\u02B9','\u0060','\u00B4','\uFF07'];
  apos.forEach(a=>{ s=s.replaceAll(a,"'"); });
  return s.normalize('NFKD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/\s+/g,' ').trim();
}

function doLogin(){
  const pwd=document.getElementById('pwd-inp').value.trim();
  if(!pwd){ showErr('Ingresa la contraseña'); return; }
  token=pwd;
  fetch(`${GAMECOINS_API_URL}/api/admin/cache_status`,{headers:ah()}).then(r=>{
    if(r.ok){
      show('login-screen',false); show('app',true);
      document.getElementById('header-actions').style.display='flex';
      checkCashSetting();
    } else { showErr('Contraseña incorrecta'); token=''; }
  }).catch(()=>showErr('No se pudo conectar al servidor'));
}
function doLogout(){ token=''; show('login-screen',true); show('app',false); allCards=[]; }
function showErr(msg){
  const el=document.getElementById('login-err');
  el.textContent=msg; el.classList.remove('hidden');
}
document.getElementById('pwd-inp').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

async function checkCashSetting(){
  try{
    const r=await fetch(`${GAMECOINS_API_URL}/api/public/buylist_status`);
    const s=await r.json(); cashEnabled=s.cash_enabled;
    if(!cashEnabled){
      ['pay-cash-col','bar-cash-wrap','cash-hdr'].forEach(id=>{
        const el=document.getElementById(id); if(el) el.style.display='none';
      });
    }
  }catch(e){}
}

function onFile(f){
  csvFile=f;
  document.getElementById('btn-analyze').disabled=!f;
  setText('hdr-file',f?f.name:'—');
}
async function analyze(){
  if(!csvFile) return;
  show('loading-state',true); show('results-section',false);
  try{
    const fd=new FormData(); fd.append('file',csvFile);
    const r=await fetch(`${GAMECOINS_API_URL}/api/public/analyze_buylist`,{method:'POST',body:fd,headers:ahForm()});
    if(!r.ok){const e=await r.json();throw new Error(e.detail||`HTTP ${r.status}`)}
    allCards=await r.json();
    renderAll();
  }catch(e){
    show('loading-state',false);
    toast(`❌ ${e.message}`,'error');
  }
}

function statusOf(c){
  if(c.stock_actual===null||c.stock_actual===undefined) return 'sinjs';
  const s=c.buying_status;
  if(s==='muy_alta'||s==='compramos') return 'buying';
  if(s==='compra_parcial') return 'partial';
  if(s==='stock_completo') return 'full';
  return 'unlisted';
}
function tierOf(c){ return c.tier||'sin_lista'; }

function renderAll(){
  show('loading-state',false); show('results-section',true); show('totals-bar',true);
  const list=document.getElementById('cards-list');
  list.innerHTML='';
  let nBuying=0,nFull=0,nSinJS=0;

  allCards.forEach((c,idx)=>{
    const st=statusOf(c), tier=tierOf(c);
    const canBuy=st==='buying'||st==='partial';
    if(canBuy) nBuying++; if(st==='full') nFull++; if(st==='sinjs') nSinJS++;
    const maxQty=c.qty_comprar??(canBuy?c.qty:0);
    const cond={near_mint:'NM',light_played:'LP',moderately_played:'MP',heavily_played:'HP',damaged:'DMG'}[c.condition]||'';
    const condColor={near_mint:'#16a34a',light_played:'#65a30d',moderately_played:'#d97706',heavily_played:'#dc2626',damaged:'#9f1239'}[c.condition]||'#94a3b8';
    const isFoil=c.foil&&c.foil!=='normal';
    const cupoFill=c.max_stock?Math.min(100,Math.round(((c.stock_actual||0)/c.max_stock)*100)):0;

    const tierBadge={
      muy_alta:   `<span class="tier-muy" onclick="openTier(${idx})">🔥 Muy Alta</span>`,
      alta:       `<span class="tier-alta" onclick="openTier(${idx})">⭐ Alta</span>`,
      normal:     `<span class="tier-normal" onclick="openTier(${idx})">📦 Normal</span>`,
      no_comprar: `<span class="tier-muy" onclick="openTier(${idx})">🚫 No Comprar</span>`
    }[tier]||`<span class="tier-none" onclick="openTier(${idx})">— Sin tier</span>`;

    const statusBadge={
      buying:  `<span class="gq-badge gb-buying"><i class="fas fa-circle-check" style="font-size:9px"></i> Compramos</span>`,
      partial: `<span class="gq-badge gb-partial"><i class="fas fa-bolt" style="font-size:9px"></i> Parcial ${maxQty}/${c.qty}</span>`,
      full:    `<span class="gq-badge gb-full"><i class="fas fa-ban" style="font-size:9px"></i> Completo</span>`,
      sinjs:   `<span class="gq-badge gb-sinjs"><i class="fas fa-triangle-exclamation" style="font-size:9px"></i> Sin JS</span>`,
      unlisted:`<span class="gq-badge gb-sinlista">🚫 No compramos</span>`,
    }[st]||'';

    const stockColor=(c.stock_actual||0)===0?'#dc2626':(c.stock_actual||0)<3?'#d97706':'#16a34a';

    const div=document.createElement('div');
    div.className=`tbl-row card-row ${st==='full'?'row-full':st==='unlisted'?'row-unlisted':st==='sinjs'?'row-sinjs':''}`;
    div.id=`row-${idx}`; div.dataset.status=st; div.dataset.tier=tier; div.dataset.name=canonical(c.name);

    const c1=`<div style="display:flex;align-items:flex-start;padding-top:2px">
      <input type="checkbox" class="gq-check cc" data-idx="${idx}"
        ${canBuy?'checked':''} ${canBuy?'':'disabled'} onchange="updateBar()">
    </div>`;

    const c2=`<div style="min-width:0">
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:5px;margin-bottom:3px">
        <span style="font-weight:700;font-size:13px;color:#0f172a">${esc(c.name)}</span>
        ${isFoil?`<span class="gq-badge gb-foil">✨ ${c.foil}</span>`:''}
        ${c.is_estaca?`<span class="gq-badge gb-estaca">★ De Nicho</span>`:''}
        ${cond?`<span style="font-size:10px;font-weight:700;color:${condColor}">${cond}</span>`:''}
      </div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;align-items:center">${statusBadge}</div>
    </div>`;

    const c3=`<div style="text-align:center">${tierBadge}</div>`;

    const c4=`<div class="col-desktop" style="text-align:right">
      <div style="font-size:12px;font-weight:700;color:#475569">${fmtUSD(c.price_usd_raw)}</div>
      ${c.is_estaca?`<div style="font-size:9px;color:#94a3b8">→ ${fmtUSD(c.price_usd)} · <span style="color:#7c3aed">${{csv:'CSV',cardkingdom:'CK',fallback_tipo:'tipo'}[c.nicho_base]||''}</span></div>`:''}
    </div>`;

    const c5=`<div class="col-desktop" style="text-align:right">
      <div style="font-weight:900;font-size:12px;color:#7c3aed" id="pqp-${idx}">
        ${canBuy?fmtCLP(c.price_credito*maxQty):'—'}
      </div>
    </div>`;

    const c6=`<div class="col-desktop" style="text-align:right" id="pcash-wrap-${idx}">
      <div style="font-weight:700;font-size:12px;color:#16a34a" id="pcs-${idx}">
        ${canBuy&&cashEnabled?fmtCLP(c.price_cash*maxQty):'—'}
      </div>
    </div>`;

    const c7=`<div class="col-desktop" style="text-align:center">
      ${st==='sinjs'
        ?`<span style="color:#dc2626;font-size:11px;font-weight:700">N/A</span>`
        :`<div style="font-weight:700;font-size:13px;color:${stockColor}">${c.stock_actual??0}</div>
         ${c.max_stock?`<div class="cupo-bar"><div class="cupo-fill" style="width:${cupoFill}%"></div></div>`:''}
        `}
    </div>`;

    const c8=`<div class="col-desktop" style="text-align:center">
      <div style="font-weight:700;font-size:13px;color:${maxQty>0?'#16a34a':'#94a3b8'}">${canBuy?maxQty:'—'}</div>
    </div>`;

    const c9=canBuy?`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div class="qty-wrap">
        <button class="qty-btn" onclick="changeQty(${idx},-1)">−</button>
        <input type="number" class="qty-inp" id="qty-${idx}" value="${maxQty}" min="1" max="${maxQty}"
          oninput="onQtyChange(${idx})">
        <button class="qty-btn" onclick="changeQty(${idx},1)">+</button>
      </div>
      <div style="font-size:9px;color:#94a3b8">máx ${maxQty}</div>
    </div>`:`<div style="text-align:center;color:#94a3b8;font-size:12px">—</div>`;

    div.innerHTML=c1+c2+c3+c4+c5+c6+c7+c8+c9;
    list.appendChild(div);
  });

  setText('st-total',allCards.length); setText('st-buying',nBuying); setText('st-full',nFull);
  updateBar();

  if(nSinJS>0){
    show('sinjs-alert',true);
    setText('sinjs-txt',`${nSinJS} carta${nSinJS>1?'s':''} sin stock en Jumpseller (N/A). Puede indicar que el producto no existe en JS o que la caché está desactualizada.`);
  }
}

function changeQty(idx,d){
  const inp=document.getElementById(`qty-${idx}`);
  if(!inp) return;
  const mx=parseInt(inp.max)||1;
  inp.value=Math.max(1,Math.min(mx,parseInt(inp.value||1)+d));
  onQtyChange(idx);
}
function onQtyChange(idx){
  const c=allCards[idx], inp=document.getElementById(`qty-${idx}`);
  if(!inp) return;
  const mx=parseInt(inp.max)||1;
  let v=parseInt(inp.value)||1;
  if(v<1)v=1; if(v>mx)v=mx; inp.value=v;
  const ep=document.getElementById(`pqp-${idx}`), ec=document.getElementById(`pcs-${idx}`);
  if(ep) ep.textContent=fmtCLP(c.price_credito*v);
  if(ec) ec.textContent=fmtCLP(c.price_cash*v);
  updateBar();
}
function recalcTotals(){
  let qp=0,cash=0,count=0;
  document.querySelectorAll('.cc:checked:not(:disabled)').forEach(cb=>{
    const idx=parseInt(cb.dataset.idx), c=allCards[idx];
    const qty=parseInt(document.getElementById(`qty-${idx}`)?.value||1);
    qp+=c.price_credito*qty; cash+=c.price_cash*qty; count++;
  });
  return {qp,cash,count};
}
function updateBar(){
  const t=recalcTotals();
  setText('bar-count',`${t.count} cartas`);
  setText('bar-qp',fmtCLP(t.qp)); setText('bar-cash',fmtCLP(t.cash));
  setText('st-qp',fmtCLP(t.qp)); setText('st-cash',fmtCLP(t.cash));
  setText('pay-qp-tot',fmtCLP(t.qp)); setText('pay-cash-tot',fmtCLP(t.cash));
  document.getElementById('btn-confirm').disabled=(!t.count);
}

function setStatusFilter(f,btn){
  statusFilter=f;
  document.querySelectorAll('[onclick*="setStatusFilter"]').forEach(b=>{ b.className='tab-btn tab-off'; if(b.getAttribute('style')&&b.getAttribute('style').includes('color')) b.className='tab-btn tab-off'; });
  if(btn){ btn.className='tab-btn tab-on'; }
  applyFilters();
}
function setTierFilter(f,btn){
  tierFilter=f;
  document.querySelectorAll('[onclick*="setTierFilter"]').forEach(b=>{ b.className='tab-btn tab-off'; });
  if(btn){ btn.className='tab-btn tab-on'; }
  applyFilters();
}
function applyFilters(){
  searchQ=document.getElementById('search-inp')?.value.toLowerCase()||'';
  document.querySelectorAll('.card-row').forEach(row=>{
    const st=row.dataset.status, tier=row.dataset.tier, nm=row.dataset.name||'';
    const ok=(statusFilter==='all'||st===statusFilter)&&(tierFilter==='all'||tier===tierFilter)&&(!searchQ||nm.includes(searchQ));
    row.classList.toggle('row-hidden',!ok);
  });
}
function selectAll(v){ document.querySelectorAll('.cc:not(:disabled)').forEach(cb=>cb.checked=v); document.getElementById('chk-all').checked=v; updateBar(); }
function toggleAll(v){selectAll(v)}
function selectPay(m){
  payMode=m;
  document.getElementById('pay-qp').className='pay-opt'+(m==='credito'?' sel-qp':'');
  document.getElementById('pay-cash').className='pay-opt'+(m==='cash'?' sel-cash':'');
}

async function openTier(idx){
  const c=allCards[idx];
  let selected=null;
  await Swal.fire({
    title:`Tier: ${c.name}`,
    html:`<div style="display:flex;flex-direction:column;gap:8px;margin-top:8px">
      ${[['muy_alta','🔥 Muy Alta'],['alta','⭐ Alta'],['normal','📦 Normal'],['no_comprar','🚫 No Comprar'],['quitar','🗑 Resetear Automático']].map(([t,lbl])=>`
      <button data-tier="${t}"
        style="padding:10px 14px;border-radius:10px;background:#f8fafc;border:1px solid #e2e8f0;color:#0f172a;font-weight:700;font-size:13px;cursor:pointer;text-align:left;transition:.12s"
        onmouseover="this.style.background='#f1f5f9'"
        onmouseout="this.style.background='#f8fafc'">
        ${lbl}
      </button>`).join('')}
    </div>`,
    showConfirmButton:false,showCancelButton:true,cancelButtonText:'Cancelar',
    didOpen:()=>{
      document.querySelectorAll('[data-tier]').forEach(b=>{
        b.addEventListener('click',()=>{ selected=b.dataset.tier; Swal.close(); });
      });
    }
  });
  if(!selected) return;

  try{
    if(selected==='quitar'){
      const lr=await fetch(`${GAMECOINS_API_URL}/api/admin/staples`,{headers:ah()});
      const ll=await lr.json();
      const ex=ll.find(s=>canonical(s.name)===canonical(c.name));
      if(ex) await fetch(`${GAMECOINS_API_URL}/api/admin/staples/${ex.id}`,{method:'DELETE',headers:ah()});
      allCards[idx].tier='normal';
    } else {
      await fetch(`${GAMECOINS_API_URL}/api/admin/staples`,{
        method:'POST',headers:ah(),
        body:JSON.stringify({name:c.name,tier:selected,margin_factor:2.5})
      });
      allCards[idx].tier=selected;
    }
    const row=document.getElementById(`row-${idx}`);
    if(row) row.remove();
    renderRow(idx);
    updateBar();
    toast(`✅ ${c.name} → ${selected==='quitar'?'Automático':selected}`);
  }catch(e){ toast(`❌ ${e.message}`,'error'); }
}

function renderRow(idx){
  const list=document.getElementById('cards-list');
  const c=allCards[idx];
  const st=statusOf(c), tier=tierOf(c);
  const canBuy=st==='buying'||st==='partial';
  const tierBadge={
    muy_alta:`<span class="tier-muy" onclick="openTier(${idx})">🔥 Muy Alta</span>`,
    alta:    `<span class="tier-alta" onclick="openTier(${idx})">⭐ Alta</span>`,
    normal:  `<span class="tier-normal" onclick="openTier(${idx})">📦 Normal</span>`,
    no_comprar:`<span class="tier-muy" onclick="openTier(${idx})">🚫 No Comprar</span>`
  }[tier]||`<span class="tier-normal" onclick="openTier(${idx})">📦 Normal</span>`;
  const div=document.createElement('div');
  div.className='tbl-row card-row';
  div.id=`row-${idx}`; div.dataset.status=st; div.dataset.tier=tier; div.dataset.name=canonical(c.name);
  div.innerHTML=`
    <div><input type="checkbox" class="gq-check cc" data-idx="${idx}" ${canBuy?'checked':''} ${canBuy?'':'disabled'} onchange="updateBar()"></div>
    <div><span style="font-weight:700;font-size:13px;color:#0f172a">${esc(c.name)}</span></div>
    <div style="text-align:center">${tierBadge}</div>
    <div></div><div></div><div></div><div></div><div></div><div></div>`;
  const rows=list.querySelectorAll('.card-row');
  if(idx<rows.length) list.insertBefore(div,rows[idx]);
  else list.appendChild(div);
  applyFilters();
}

async function confirmOrder(){
  const email=document.getElementById('v-email').value.trim();
  const rut=document.getElementById('v-rut').value.trim();
  const nombre=document.getElementById('v-nombre').value.trim();
  const notas=document.getElementById('v-notas').value.trim();
  const items=[];
  document.querySelectorAll('.cc:checked:not(:disabled)').forEach(cb=>{
    const idx=parseInt(cb.dataset.idx);
    const qty=parseInt(document.getElementById(`qty-${idx}`)?.value||1);
    items.push({...allCards[idx],qty,qty_selected:qty});
  });
  if(!items.length) return toast('Sin cartas seleccionadas','warning');
  if(!payMode) return toast('Selecciona forma de pago','warning');
  const totalQP=items.reduce((s,i)=>s+i.price_credito*i.qty,0);
  const totalCash=items.reduce((s,i)=>s+i.price_cash*i.qty,0);
  const {isConfirmed}=await Swal.fire({
    title:'¿Registrar orden?',
    html:`<div style="font-size:13px;color:#475569;line-height:1.8">
      <strong style="color:#0f172a">${items.length} cartas</strong> · 
      <strong style="color:#0f172a">${payMode==='credito'?'💎 QP':'💵 Cash'}</strong><br>
      Total: <strong style="color:${payMode==='credito'?'#7c3aed':'#16a34a'};font-size:1.1rem">
        ${fmtCLP(payMode==='credito'?totalQP:totalCash)}</strong>
      ${email?`<br><span style="color:#94a3b8;font-size:11px">Copia → ${email}</span>`:''}
    </div>`,
    confirmButtonText:'Confirmar',showCancelButton:true,cancelButtonText:'Revisar',
    confirmButtonColor:'#0f172a',
  });
  if(!isConfirmed) return;
  const btn=document.getElementById('btn-confirm');
  btn.disabled=true; btn.innerHTML='<i class="fas fa-circle-notch spin" style="margin-right:8px"></i>Registrando…';
  try{
    const r=await fetch(`${GAMECOINS_API_URL}/api/admin/commit_buylist`,{
      method:'POST',headers:ah(),
      body:JSON.stringify({email:email||`admin-${Date.now()}@gq.internal`,rut,nombre,notas,
        payment_preference:payMode,items,total_credito:totalQP,total_cash:totalCash,source:'interna'}),
    });
    const d=await r.json();
    if(!r.ok) throw new Error(d.detail||'Error');
    Swal.fire({icon:'success',title:`Orden #${d.order_id} registrada`,
      html:`<div style="font-size:13px;color:#475569">${email?`Copia enviada a <strong>${email}</strong>`:''}</div>`,
      confirmButtonColor:'#0f172a'});
  }catch(e){ toast(`❌ ${e.message}`,'error'); }
  finally{
    btn.disabled=false;
    btn.innerHTML='<i class="fas fa-paper-plane" style="margin-right:8px"></i>Registrar y enviar copia al vendedor';
  }
}

function exportSelected(){
  const rows=[['Carta','Tier','Condición','Foil','Version','Cant.','QP (CLP)','Cash (CLP)','Ref CK (USD)','Stock JS','Cupo','Estado']];
  document.querySelectorAll('.cc:checked:not(:disabled)').forEach(cb=>{
    const idx=parseInt(cb.dataset.idx), c=allCards[idx];
    const qty=parseInt(document.getElementById(`qty-${idx}`)?.value||1);
    rows.push([c.name,c.tier||'sin_lista',c.condition,c.foil||'normal',c.version||'',
      qty,c.price_credito*qty,c.price_cash*qty,c.price_usd_raw,c.stock_actual??'N/A',
      c.qty_comprar??0,c.buying_status]);
  });
  const csv=rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download=`buylist-interna-${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function fmtCLP(n){return '$'+Math.round(n||0).toLocaleString('es-CL')}
function fmtUSD(n){return '$'+(n||0).toFixed(2)}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function show(id,v){const el=document.getElementById(id);if(el)el.style.display=v?'':'none'}
function setText(id,v){const el=document.getElementById(id);if(el)el.textContent=v}
function toast(msg,type='success'){
  Swal.mixin({toast:true,position:'bottom-end',showConfirmButton:false,timer:3000})
    .fire({icon:type,title:msg});
}
</script>
