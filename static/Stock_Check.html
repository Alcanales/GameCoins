<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock Check — GameQuest</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body { background:#0f172a; font-family:'Inter',sans-serif; color:#e2e8f0; }
    .glass  { background:rgba(255,255,255,0.035); backdrop-filter:blur(12px);
              border:1px solid rgba(255,255,255,0.07); border-radius:14px; }
    .pill   { display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;
              font-size:9px;font-weight:700;white-space:nowrap; }
    .p-ma   { background:#78350f;color:#fde68a;border:1px solid #92400e; }
    .p-al   { background:#14532d;color:#86efac;border:1px solid #166534; }
    .p-no   { background:#1e293b;color:#94a3b8;border:1px solid #334155; }
    .inp    { background:#1e293b;border:1px solid #334155;color:#e2e8f0;
              border-radius:10px;padding:9px 14px;font-size:13px;transition:border .15s; }
    .inp:focus  { outline:none;border-color:#eab308;box-shadow:0 0 0 3px rgba(234,179,8,.1); }
    .inp::placeholder { color:#334155; }
    .tier-btn { width:100%;text-align:left;padding:10px 14px;border-radius:10px;
                background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);
                color:#cbd5e1;font-weight:700;font-size:13px;cursor:pointer;transition:.15s; }
    .tier-btn:hover { background:rgba(255,255,255,.09); }
    .tier-btn.active { border-color:#eab308;background:rgba(234,179,8,.12);color:#fde68a; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .spin { animation:spin .8s linear infinite; display:inline-block; }
    /* Variante row */
    .var-row { display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;
               padding:6px 10px;border-radius:8px;background:rgba(255,255,255,.025);
               border:1px solid rgba(255,255,255,.04);margin-top:4px; }
    .var-row .vname { font-size:11px;color:#94a3b8;line-height:1.3; }
    .var-row .vstk  { font-size:12px;font-weight:700;text-align:right; }
    .var-row .vprc  { font-size:11px;color:#64748b;text-align:right; }
  </style>
</head>
<body class="min-h-screen">

<!-- ═══════════════════ LOGIN ═══════════════════ -->
<div id="login-view" class="flex min-h-screen items-center justify-center p-4">
  <div class="glass p-8 w-full max-w-xs text-center">
    <div class="w-11 h-11 bg-yellow-500/10 rounded-xl flex items-center justify-center mx-auto mb-4">
      <i class="fas fa-magnifying-glass text-yellow-400 text-lg"></i>
    </div>
    <h1 class="text-xl font-black text-white">Stock Check</h1>
    <p class="text-xs text-slate-500 mt-1 mb-6">Consulta de stock · GameQuest</p>
    <div class="space-y-3 text-left">
      <input id="lu" type="text"     class="inp w-full" placeholder="Usuario">
      <input id="lp" type="password" class="inp w-full" placeholder="Contraseña"
             onkeydown="if(event.key==='Enter')doLogin()">
      <button onclick="doLogin()"
        class="w-full bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black py-3
               rounded-xl text-xs uppercase tracking-wide transition">
        INGRESAR
      </button>
    </div>
    <p id="login-err" class="hidden text-red-400 text-xs mt-3"></p>
  </div>
</div>

<!-- ═══════════════════ APP ═══════════════════ -->
<div id="app" class="hidden min-h-screen flex flex-col">

  <!-- Header -->
  <header class="px-5 py-3 border-b border-white/5 bg-slate-900/80 backdrop-blur sticky top-0 z-50
                 flex items-center justify-between">
    <div class="flex items-center gap-3">
      <div class="w-8 h-8 bg-yellow-500/12 rounded-lg flex items-center justify-center">
        <i class="fas fa-magnifying-glass text-yellow-400 text-sm"></i>
      </div>
      <div>
        <span class="font-black text-white text-sm">Stock Check</span>
        <span id="cache-badge" class="ml-2 text-[9px] font-bold px-2 py-0.5 rounded-full
               bg-slate-800 text-slate-500 border border-slate-700">cache —</span>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <!-- Sync -->
      <button onclick="syncCache()" id="btn-sync"
        class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase
               bg-yellow-500/10 text-yellow-400 border border-yellow-500/20
               hover:bg-yellow-500/25 transition">
        <i id="sync-icon" class="fas fa-rotate-right"></i>
        <span class="hidden sm:inline">Sync JS</span>
      </button>
      <button onclick="doLogout()"
        class="text-slate-600 text-xs font-bold hover:text-white transition px-2">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="flex-1 p-4 md:p-6 max-w-3xl mx-auto w-full space-y-4">

    <!-- Buscador -->
    <div class="glass p-4">
      <p class="text-[9px] font-bold text-slate-600 uppercase tracking-widest mb-3">
        Buscar carta en Jumpseller
      </p>
      <div class="flex gap-2">
        <div class="relative flex-1">
          <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-600 text-sm pointer-events-none"></i>
          <input id="q" type="text" class="inp w-full pl-10" placeholder="Escribe el nombre…  ej: sol ring"
                 onkeydown="if(event.key==='Enter')search()" oninput="onInput()">
          <button id="btn-clear" onclick="clearSearch()"
            class="hidden absolute right-3 top-1/2 -translate-y-1/2 text-slate-600 hover:text-white transition text-sm">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        <button onclick="search()" id="btn-search"
          class="bg-yellow-500 hover:bg-yellow-400 text-slate-900 font-black px-5 rounded-xl
                 text-xs uppercase tracking-wide transition whitespace-nowrap">
          BUSCAR
        </button>
      </div>
      <p id="q-hint" class="text-[10px] text-slate-600 mt-2">
        La búsqueda normaliza el nombre y suma el stock de <strong class="text-slate-500">todas las versiones</strong> (foil, set, condición, etc.)
      </p>
    </div>

    <!-- Estado cache / loading -->
    <div id="loading" class="hidden glass p-6 text-center">
      <i class="fas fa-circle-notch spin text-yellow-400 text-xl mb-2 block"></i>
      <p class="text-xs text-slate-500">Consultando catálogo…</p>
    </div>

    <!-- Sin resultados -->
    <div id="no-results" class="hidden glass p-8 text-center">
      <i class="fas fa-ghost text-3xl text-slate-700 mb-3 block"></i>
      <p class="font-bold text-slate-500" id="no-results-msg">Sin resultados</p>
      <p class="text-xs text-slate-700 mt-1">Prueba con otro nombre o revisa la ortografía</p>
    </div>

    <!-- Resultados -->
    <div id="results-wrap" class="hidden space-y-3">
      <div class="flex items-center justify-between px-1">
        <p class="text-[10px] font-bold text-slate-600 uppercase tracking-wider">
          Resultados — <span id="res-count" class="text-slate-400">0</span>
        </p>
        <p id="res-q" class="text-[10px] text-slate-700 italic"></p>
      </div>
      <div id="results-list" class="space-y-2"></div>
    </div>

  </main>
</div>

<!-- ═══════════════════ CARD TEMPLATE (JS) ═══════════════════ -->
<script>
const API = "https://gamecoins.onrender.com";
let TOKEN = null;
let lastResults = [];

// Normalización canónica idéntica a _canonical() de Python
function canonical(name) {
  if (!name) return '';
  let n = name.split('|')[0].trim();
  n = n.split(/[\u2013\u2014\u2015]/)[0].trim();
  n = n.replace(/[\(\[][^\)\]]*[\)\]]/g, '').trim();
  n = n.replace(/[\u2018\u2019\u201A\u201B\u02BC\u02B9\u0060\u00B4\uFF07]/g, "'");
  n = n.normalize('NFD').replace(/\p{Mn}/gu, '');
  return n.toLowerCase().replace(/\s+/g, ' ').trim();
}

function ah() { return { 'Authorization': `Bearer ${TOKEN}`, 'Content-Type': 'application/json' }; }

// ── Auth ───────────────────────────────────────────────────────────────────────
async function doLogin() {
  const u = document.getElementById('lu').value.trim();
  const p = document.getElementById('lp').value.trim();
  const errEl = document.getElementById('login-err');
  errEl.classList.add('hidden');
  try {
    const r = await fetch(`${API}/api/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username: u, password: p })
    });
    if (!r.ok) { errEl.textContent = 'Credenciales inválidas'; errEl.classList.remove('hidden'); return; }
    TOKEN = (await r.json()).access_token;
    document.getElementById('login-view').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    checkCacheStatus();
    document.getElementById('q').focus();
  } catch(e) { errEl.textContent = 'Sin conexión'; errEl.classList.remove('hidden'); }
}

function doLogout() { TOKEN = null; location.reload(); }

// ── Cache status ───────────────────────────────────────────────────────────────
async function checkCacheStatus() {
  try {
    const r = await fetch(`${API}/api/admin/cache_status`, { headers: ah() });
    const d = await r.json();
    const badge = document.getElementById('cache-badge');
    if (d.cache_valid) {
      const min = Math.floor(d.cache_age_sec / 60);
      badge.textContent = `${d.cards_loaded} cartas · hace ${min}m`;
      badge.className = badge.className.replace('text-slate-500 border-slate-700',
                                                 'text-green-400 border-green-800');
    } else {
      badge.textContent = 'cache expirado';
      badge.className = badge.className.replace('text-slate-500 border-slate-700',
                                                 'text-amber-400 border-amber-800');
    }
  } catch(_) {}
}

async function syncCache() {
  const icon = document.getElementById('sync-icon');
  const btn  = document.getElementById('btn-sync');
  icon.classList.add('spin'); btn.disabled = true;
  try {
    const r = await fetch(`${API}/api/admin/warmup_cache`, { method: 'POST', headers: ah() });
    const d = await r.json();
    if (!r.ok) throw new Error(d.detail || 'Error');
    showToast(`✅ ${d.cards_loaded} cartas cargadas — ${d.total_stock} u. en stock`);
    checkCacheStatus();
    // Re-ejecutar búsqueda con datos frescos
    if (document.getElementById('q').value.trim().length >= 2) search();
  } catch(e) {
    showToast(`❌ ${e.message}`, 'error');
  } finally {
    icon.classList.remove('spin'); btn.disabled = false;
  }
}

// ── Búsqueda ───────────────────────────────────────────────────────────────────
function onInput() {
  const q = document.getElementById('q').value;
  document.getElementById('btn-clear').classList.toggle('hidden', !q);
  // AutoSearch con debounce si tiene 3+ caracteres
  clearTimeout(window._searchTimer);
  if (q.trim().length >= 3)
    window._searchTimer = setTimeout(search, 500);
}

function clearSearch() {
  document.getElementById('q').value = '';
  document.getElementById('btn-clear').classList.add('hidden');
  document.getElementById('results-wrap').classList.add('hidden');
  document.getElementById('no-results').classList.add('hidden');
  document.getElementById('q').focus();
}

async function search() {
  const q = document.getElementById('q').value.trim();
  if (q.length < 2) return;

  document.getElementById('loading').classList.remove('hidden');
  document.getElementById('results-wrap').classList.add('hidden');
  document.getElementById('no-results').classList.add('hidden');

  try {
    const r = await fetch(`${API}/api/admin/stock_lookup?q=${encodeURIComponent(q)}`, { headers: ah() });
    if (!r.ok) throw new Error((await r.json()).detail || 'Error');
    const d = await r.json();
    lastResults = d.results || [];

    document.getElementById('loading').classList.add('hidden');

    if (!lastResults.length) {
      document.getElementById('no-results-msg').textContent = `Sin resultados para "${q}"`;
      document.getElementById('no-results').classList.remove('hidden');
      return;
    }

    renderResults(d);
  } catch(e) {
    document.getElementById('loading').classList.add('hidden');
    showToast(`❌ ${e.message}`, 'error');
  }
}

// ── Renderizado ────────────────────────────────────────────────────────────────
const TIER_PILL = {
  muy_alta: '<span class="pill p-ma">⭐ Muy Alta</span>',
  alta:     '<span class="pill p-al">🟢 Alta</span>',
  normal:   '<span class="pill p-no">📄 Normal</span>',
};
const TIER_OPTIONS = [
  { v: 'muy_alta', label: '⭐ Muy Alta',  desc: 'Comprar siempre — sin límite de stock' },
  { v: 'alta',     label: '🟢 Alta',      desc: 'Stock mínimo 8 unidades' },
  { v: 'normal',   label: '📄 Normal',    desc: 'Stock mínimo 4 unidades' },
];

function renderResults(d) {
  const q = document.getElementById('q').value.trim();

  document.getElementById('res-count').textContent =
    `${d.results.length}${d.total_matches > 20 ? ` de ${d.total_matches}` : ''}`;
  document.getElementById('res-q').textContent = `"${d.q_normalized}"`;

  const list = document.getElementById('results-list');
  list.innerHTML = '';

  d.results.forEach((c, i) => {
    const inList = c.in_list;
    const tierPill = inList ? (TIER_PILL[c.tier] || '') : '';

    const stockColor =
      c.total_stock === 0  ? 'text-red-400' :
      c.total_stock <= 2   ? 'text-amber-400' :
      c.total_stock <= 4   ? 'text-yellow-300' : 'text-green-400';

    // Variantes (mostrar solo si hay más de 1)
    const varsHtml = (c.variants && c.variants.length > 1) ? `
      <details class="mt-3">
        <summary class="text-[10px] text-slate-600 cursor-pointer hover:text-slate-400 select-none">
          ${c.variants.length} versiones en Jumpseller
        </summary>
        <div class="mt-2 space-y-1">
          ${c.variants.map(v => `
            <div class="var-row">
              <span class="vname">${v.name}</span>
              <span class="vstk ${v.stock===0?'text-slate-700':v.stock<=2?'text-amber-400':'text-slate-300'}">${v.stock} u.</span>
              <span class="vprc">${v.price>0?'$'+v.price.toLocaleString():''}</span>
            </div>`).join('')}
        </div>
      </details>` : '';

    const card = document.createElement('div');
    card.className = `glass p-4 transition-all ${inList ? 'border-l-2 ' + (
      c.tier==='muy_alta'?'border-amber-500':c.tier==='alta'?'border-green-500':'border-slate-500'
    ) : ''}`;
    card.innerHTML = `
      <div class="flex items-start justify-between gap-3">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 flex-wrap">
            <p class="font-black text-white text-sm">${c.display_name}</p>
            ${tierPill}
          </div>
          <p class="text-[9px] text-slate-700 mt-0.5 font-mono">${c.key}</p>
          ${c.min_stock ? `<p class="text-[10px] text-slate-600 mt-1">mín. ${c.min_stock} u. según tier</p>` : ''}
          ${varsHtml}
        </div>

        <div class="flex items-center gap-3 flex-shrink-0">
          <!-- Stock total -->
          <div class="text-right">
            <p class="${stockColor} text-2xl font-black leading-none">${c.total_stock}</p>
            <p class="text-[9px] text-slate-700 mt-0.5">en JS</p>
            ${c.price_js > 0 ? `<p class="text-[10px] text-slate-500 mt-0.5">$${c.price_js.toLocaleString()}</p>` : ''}
          </div>

          <!-- Botón de lista -->
          <button onclick="openTierMenu('${c.key.replace(/'/g,"\\'")}', '${(c.display_name||'').replace(/'/g,"\\'")}', '${c.tier||''}', ${c.staple_id||'null'}, ${i})"
            class="flex flex-col items-center justify-center w-12 h-12 rounded-xl transition text-[10px] font-bold gap-0.5
                   ${inList
                     ? c.tier==='muy_alta' ? 'bg-amber-600/40 text-amber-300 border border-amber-500/40 hover:bg-amber-500/50'
                     : c.tier==='alta'     ? 'bg-green-700/35 text-green-300 border border-green-500/30 hover:bg-green-600/50'
                     :                       'bg-slate-600/35 text-slate-300 border border-slate-500/30 hover:bg-slate-500/50'
                     : 'bg-slate-800/70 text-slate-500 border border-slate-700/50 hover:bg-slate-700/70 hover:text-white'
                   }">
            <i class="fas fa-layer-group text-base"></i>
            <span>${inList ? 'Lista' : 'Agregar'}</span>
          </button>
        </div>
      </div>`;

    list.appendChild(card);
  });

  document.getElementById('results-wrap').classList.remove('hidden');
}

// ── Menú de Tier ───────────────────────────────────────────────────────────────
async function openTierMenu(key, displayName, currentTier, stapleId, idx) {
  let selected = null;

  const btns = TIER_OPTIONS.map(t => `
    <button class="tier-btn ${currentTier===t.v?'active':''}" data-tier="${t.v}">
      ${t.label}
      <span style="display:block;font-size:10px;font-weight:400;color:#64748b;margin-top:2px">${t.desc}</span>
    </button>`).join('') + (currentTier ? `
    <button class="tier-btn" data-tier="quitar"
      style="color:#f87171;border-color:rgba(239,68,68,.2);margin-top:4px">
      <i class="fas fa-trash-can mr-1.5 text-xs"></i> Quitar de la lista
    </button>` : '');

  await Swal.fire({
    title: 'Lista de Demanda',
    html: `
      <p style="font-size:12px;color:#64748b;margin:-4px 0 12px">
        <strong style="color:#e2e8f0">${displayName || key}</strong>
      </p>
      <div style="display:flex;flex-direction:column;gap:5px">${btns}</div>`,
    showConfirmButton: false,
    showCancelButton: true,
    cancelButtonText: 'Cancelar',
    background: '#1e293b',
    color: '#e2e8f0',
    customClass: { popup: 'rounded-2xl' },
    didOpen: () => {
      document.querySelectorAll('.tier-btn').forEach(b => {
        b.addEventListener('click', () => { selected = b.dataset.tier; Swal.close(); });
      });
    }
  });

  if (!selected) return;

  try {
    if (selected === 'quitar') {
      if (!stapleId) {
        // buscar por nombre canónico (inmune a apóstrofes tipográficos)
        const lr = await fetch(`${API}/api/admin/staples`, { headers: ah() });
        const ll = await lr.json();
        const nameCanon = canonical(displayName || key);
        const ex = ll.find(s => canonical(s.name) === nameCanon);
        if (ex) {
          await fetch(`${API}/api/admin/staples/${ex.id}`, { method: 'DELETE', headers: ah() });
        }
      } else {
        await fetch(`${API}/api/admin/staples/${stapleId}`, { method: 'DELETE', headers: ah() });
      }
      lastResults[idx].in_list   = false;
      lastResults[idx].tier      = null;
      lastResults[idx].staple_id = null;
    } else {
      const r = await fetch(`${API}/api/admin/staples`, {
        method: 'POST', headers: ah(),
        body: JSON.stringify({ name: displayName || key, tier: selected, margin_factor: 2.5 })
      });
      if (!r.ok) throw new Error((await r.json()).detail || 'Error guardando');
      const saved = await r.json();
      lastResults[idx].in_list   = true;
      lastResults[idx].tier      = selected;
      lastResults[idx].staple_id = saved.id;
    }

    // Re-render sin volver a buscar (ya tenemos los datos)
    renderResults({ results: lastResults, total_matches: lastResults.length,
                    q_normalized: document.getElementById('res-q').textContent.replace(/"/g,'') });
    showToast(selected === 'quitar' ? '🗑 Quitado de la lista' : `✅ Guardado como ${selected}`);
    checkCacheStatus();

  } catch(e) {
    showToast(`❌ ${e.message}`, 'error');
  }
}

// ── Toast ──────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'success') {
  Swal.mixin({
    toast: true, position: 'top-end', showConfirmButton: false,
    timer: 2500, timerProgressBar: true,
    background: '#1e293b', color: '#e2e8f0',
    iconColor: type === 'error' ? '#f87171' : '#4ade80'
  }).fire({ icon: type === 'error' ? 'error' : 'success', title: msg });
}
</script>
</body>
</html>
