services:
  - type: web
    name: gamequest-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gamequest-db
          property: connectionString
      - key: STORE_TOKEN
        value: "gq_public_key_2025_secure"
      - key: MAINTENANCE_MODE_CANJE
        value: "false"

databases:
  - name: gamequest-db
    plan: free