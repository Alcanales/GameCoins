<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buylist Interna - GameQuest Admin</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 20px; background-color: #f4f6f9; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 2em; color: #dc3545; }  /* Rojo para admin */
        .login-box { max-width: 400px; margin: 0 auto 30px; padding: 20px; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; }
        .login-box input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        .login-box button { width: 100%; padding: 10px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .login-box button:hover { background: #b02a37; }
        .login-box .error { color: red; text-align: center; margin-top: 10px; }
        .upload-form { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; display: none; }  /* Oculto hasta login */
        .upload-form input[type="file"] { padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .upload-form button { padding: 10px 20px; background: #dc3545; color: white; border: none; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        .upload-form button:hover { background: #b02a37; }
        table { width: 100%; border-collapse: collapse; background: white; box-shadow: 0 4px 8px rgba(0,0,0,0.1); border-radius: 8px; overflow: hidden; display: none; }  /* Oculto hasta análisis */
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #dc3545; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        .rejected { background-color: #ffdddd; }
        #loading { display: none; text-align: center; margin: 20px; font-style: italic; color: #666; }
        footer { text-align: center; margin-top: 30px; font-size: 0.8em; color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Buylist Interna: Análisis Completo (Admin)</h1>
            <p>Inicia sesión para acceder al análisis ajustado a stock/límites.</p>
        </header>
        
        <div class="login-box" id="loginBox">
            <input type="text" id="adminUser" placeholder="Admin User">
            <input type="password" id="adminPass" placeholder="Admin Pass">
            <button onclick="adminLogin()">Iniciar Sesión</button>
            <div class="error" id="loginError"></div>
        </div>
        
        <div class="upload-form" id="uploadForm">
            <input type="file" id="csvFile" accept=".csv">
            <button onclick="analyzeInternal()">Analizar Buylist</button>
        </div>
        
        <div id="loading">Cargando análisis...</div>
        
        <table id="buylistTable">
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Precio Normal</th>
                    <th>Precio Foil</th>
                    <th>Stock Actual</th>
                    <th>Límite Stock</th>
                    <th>Status</th>
                    <th>Razón</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
        
        <footer>© 2026 GameQuest - Admin Panel.</footer>
    </div>

    <script>
        const GQ_API = "https://gamecoins.onrender.com";
        let ADMIN_USER = '';
        let ADMIN_PASS = '';

        function adminLogin() {
            ADMIN_USER = document.getElementById('adminUser').value.trim();
            ADMIN_PASS = document.getElementById('adminPass').value.trim();
            if (!ADMIN_USER || !ADMIN_PASS) {
                document.getElementById('loginError').innerText = 'Ingresa user y pass.';
                return;
            }
            document.getElementById('loginBox').style.display = 'none';
            document.getElementById('uploadForm').style.display = 'flex';
            document.getElementById('loginError').innerText = '';
        }

        async function analyzeInternal() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files.length) {
                alert("Sube un CSV primero.");
                return;
            }
            
            document.getElementById('loading').style.display = 'block';
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            try {
                const r = await fetch(`${GQ_API}/admin/analyze_csv`, {
                    method: 'POST',
                    headers: {
                        'x-admin-user': ADMIN_USER,
                        'x-admin-pass': ADMIN_PASS
                    },
                    body: formData
                });
                if (!r.ok) {
                    if (r.status === 401) {
                        document.getElementById('loginBox').style.display = 'block';
                        document.getElementById('uploadForm').style.display = 'none';
                        document.getElementById('loginError').innerText = 'Acceso denegado. Reintenta.';
                    }
                    throw new Error("Error en análisis o acceso denegado");
                }
                const data = await r.json();
                
                const tbody = document.querySelector('#buylistTable tbody');
                tbody.innerHTML = '';  // Limpiar
                document.getElementById('buylistTable').style.display = 'table';
                data.forEach(item => {
                    const row = document.createElement('tr');
                    if (item.status.startsWith('RECHAZADO')) {
                        row.classList.add('rejected');
                    }
                    row.innerHTML = `
                        <td>${item.name}</td>
                        <td>$${item.price_normal.toFixed(2)}</td>
                        <td>$${item.price_foil.toFixed(2)}</td>
                        <td>${item.current_stock}</td>
                        <td>${item.stock_limit}</td>
                        <td>${item.status}</td>
                        <td>${item.razon}</td>
                    `;
                    tbody.appendChild(row);
                });
            } catch (e) {
                alert("Error: " + e.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }
    </script>
</body>
</html>
