<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Buylist Pública - GameQuest</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .upload-form { margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>Buylist Pública: Cartas que Compramos</h1>
    <p>Sube tu CSV de cartas (con columnas: name, price_normal, price_foil, optional: current_stock) para ver qué podemos comprar ajustado a stock.</p>
    
    <div class="upload-form">
        <input type="file" id="csvFile" accept=".csv">
        <button onclick="analyzePublic()">Analizar Buylist</button>
    </div>
    
    <table id="buylistTable">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Precio Normal</th>
                <th>Precio Foil</th>
                <th>Stock Disponible</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const GQ_API = "https://gamecoins.onrender.com";

        async function analyzePublic() {
            const fileInput = document.getElementById('csvFile');
            if (!fileInput.files.length) {
                alert("Sube un CSV primero.");
                return;
            }
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            try {
                const r = await fetch(`${GQ_API}/api/public/analyze_buylist`, {
                    method: 'POST',
                    body: formData
                });
                if (!r.ok) throw new Error("Error en análisis");
                const data = await r.json();
                
                const tbody = document.querySelector('#buylistTable tbody');
                tbody.innerHTML = '';  // Limpiar
                data.forEach(item => {
                    if (item.status === 'APROBADO' || item.status === 'HIGH END') {  // Solo aprobados
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${item.name}</td>
                            <td>$${item.price_normal.toFixed(2)}</td>
                            <td>$${item.price_foil.toFixed(2)}</td>
                            <td>${item.stock_limit - item.current_stock} disponible</td>
                            <td>${item.status}</td>
                        `;
                        tbody.appendChild(row);
                    }
                });
                if (tbody.innerHTML === '') {
                    tbody.innerHTML = '<tr><td colspan="5">No hay cartas aprobadas.</td></tr>';
                }
            } catch (e) {
                alert("Error: " + e.message);
            }
        }
    </script>
</body>
</html>
